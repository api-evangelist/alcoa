description: >-
  Alcoa Corporation is a global industry leader in bauxite, alumina, and
  aluminum production. Founded in 1888, Alcoa operates mines, refineries, and
  smelters across Australia, Brazil, Canada, Iceland, Norway, Saudi Arabia, and
  the United States. The company is a Fortune 500 member and one of the world's
  largest aluminum producers, supplying lightweight, high-strength materials to
  automotive, aerospace, packaging, construction, and industrial markets.
  Alcoa is committed to sustainability through low-carbon aluminum production,
  responsible bauxite mining, and advancing aluminum recycling.
